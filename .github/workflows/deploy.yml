on:
  pull_request:
    branches:
      - master    # producción
      - develop   # desarrollo

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to AWS
        run: |
            cd /opt/myproject
            if [ "${{ github.ref }}" == "refs/heads/master" ]; then
              echo "Deploying to PRODUCTION..."
              docker-compose -f docker-compose.prod.yml up -d --build
            else
              echo "Deploying to DEVELOPMENT..."
              docker-compose -f docker-compose.dev.yml up -d --build
            fi
# Prueba de despliegue automático a AWS usando GitHub Actions. Se ejecuta en un runner self-hosted que tiene acceso a los comandos de Docker. Según la rama (master o develop), se despliega la aplicación usando el archivo docker-compose correspondiente.
# Asegúrate de que el runner tenga los permisos necesarios para ejecutar Docker y que la ruta /opt/myproject sea correcta para tu entorno.