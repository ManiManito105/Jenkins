on:
  pull_request:
    branches:
      - main    # producción
      - develop   # desarrollo

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Aqui deberia estar ssh pero no funciona, asi que lo hago manualmente

      - name: Deploy to AWS
        run: |
            cd /opt/myproject
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "Deploying to PRODUCTION..."
              docker-compose -f docker-compose.prod.yml up -d --build
            else
              echo "Deploying to DEVELOPMENT..."
              docker-compose -f docker-compose.dev.yml up -d --build
            fi

# Nota: Asegúrate de que el runner de GitHub Actions tenga acceso a tu servidor AWS y que Docker esté instalado y configurado correctamente.